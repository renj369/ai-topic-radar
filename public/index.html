<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AI Radar" />
    <title>AI Topic Radar</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI TOPIC RADAR</p>
          <h1>AI 产业选题雷达</h1>
        </div>
        <div class="status">
          <span id="generatedAt">加载中</span>
        </div>
      </header>

      <section class="summary-band" aria-label="今日概览">
        <div>
          <span class="metric-label">上游信号</span>
          <strong id="itemCount">--</strong>
        </div>
        <div>
          <span class="metric-label">精选栏目</span>
          <strong id="selectionCount">--</strong>
        </div>
        <div>
          <span class="metric-label">资料频道</span>
          <strong id="categoryCount">--</strong>
        </div>
      </section>

      <section class="controls" aria-label="筛选">
        <input id="searchInput" type="search" placeholder="搜索公司、模型、芯片、监管、播客" />
        <button id="showAllBtn" class="secondary-action" type="button">全部频道</button>
      </section>

      <section id="coverage" class="coverage" aria-label="上游覆盖"></section>
      <section class="workspace-nav" aria-label="编辑台视图">
        <button id="selectionModeBtn" class="workspace-btn active" type="button">精选编辑台</button>
        <button id="categoryModeBtn" class="workspace-btn" type="button">分类资料库</button>
      </section>
      <nav id="selectionTabs" class="category-tabs" aria-label="精选栏目"></nav>
      <nav id="categoryTabs" class="category-tabs" aria-label="分类频道"></nav>
      <section id="newsList" class="news-list" aria-live="polite"></section>
    </main>

    <template id="itemTemplate">
      <article class="topic-card">
        <div class="card-meta">
          <span class="score"></span>
          <span class="label"></span>
          <span class="source"></span>
        </div>
        <h2></h2>
        <p class="summary"></p>
        <p class="reason"></p>
        <a class="read-link" target="_blank" rel="noopener noreferrer">打开原文</a>
      </article>
    </template>

    <template id="categoryTemplate">
      <section class="category-section">
        <div class="category-head">
          <div>
            <h2></h2>
            <p></p>
          </div>
          <span class="category-count"></span>
        </div>
        <div class="category-list"></div>
      </section>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
